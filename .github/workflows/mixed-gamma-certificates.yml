name: Mixed-gamma exact certificates

on:
  push:
    branches: ["main", "agent/mixed-gamma-certificates"]
    paths:
      - "mixed_gamma_certificates/**"
      - "AUDIT_MIXED_GAMMA.md"
      - ".github/workflows/mixed-gamma-certificates.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "mixed_gamma_certificates/**"
      - "AUDIT_MIXED_GAMMA.md"
      - ".github/workflows/mixed-gamma-certificates.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  certificate:
    name: Singular witness (${{ matrix.case }})
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        case: [l, q_t, p, h_m, h_v, h_0]

    steps:
      - name: Check out the exact revision
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Gate committed proof inputs by SHA-256
        shell: bash
        run: |
          set -euo pipefail
          sha256sum --check --strict mixed_gamma_certificates/MANIFEST.sha256

      - name: Select Python 3.12
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: mixed_gamma_certificates/requirements-hashed.txt

      - name: Install hash-pinned regeneration dependency
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --require-hashes -r mixed_gamma_certificates/requirements-hashed.txt

      - name: Independently regenerate all six systems
        shell: bash
        run: |
          set -euo pipefail
          mkdir regenerated
          python mixed_gamma_certificates/independent_mixed_gamma_audit.py regenerated | tee generator.log
          diff -ru mixed_gamma_certificates/singular_inputs regenerated/singular_inputs

      - name: Install pinned Singular package
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes singular=1:4.3.2-p10+ds-1.1build1
          Singular --version | tee singular-version.log
          dpkg-query -W 'singular*' | sort | tee singular-packages.log

      - name: Extract and verify exact lift certificate
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "certificate-${{ matrix.case }}"
          cd "certificate-${{ matrix.case }}"
          Singular "../mixed_gamma_certificates/singular_inputs/${{ matrix.case }}.sing" 2>&1 | tee "../${{ matrix.case }}.log"
          cd ..
          test "$(sed -n '/UNIT_BASIS_CHECK/{n;p;n;p;}' "${{ matrix.case }}.log" | tr -d '\r')" = $'1\n1'
          test "$(sed -n '/LIFT_IDENTITY_CHECK/{n;p;}' "${{ matrix.case }}.log" | tr -d '\r')" = "1"

      - name: Verify the printed witness with a second polynomial engine
        shell: bash
        run: |
          set -euo pipefail
          python mixed_gamma_certificates/verify_witness.py "${{ matrix.case }}" "${{ matrix.case }}.log" | tee "${{ matrix.case }}-independent-verifier.log"

      - name: Inventory preserved evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          find "certificate-${{ matrix.case }}" -type f -print0 2>/dev/null | sort -z | xargs -0 -r sha256sum > "${{ matrix.case }}-artifact-sha256.txt"
          sha256sum "${{ matrix.case }}.log" "${{ matrix.case }}-independent-verifier.log" generator.log singular-version.log singular-packages.log >> "${{ matrix.case }}-artifact-sha256.txt" 2>/dev/null || true

      - name: Upload witness, session, and logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mixed-gamma-${{ matrix.case }}-certificate
          path: |
            certificate-${{ matrix.case }}/
            ${{ matrix.case }}.log
            ${{ matrix.case }}-independent-verifier.log
            ${{ matrix.case }}-artifact-sha256.txt
            generator.log
            singular-version.log
            singular-packages.log
          if-no-files-found: warn
