name: Full Lean formalization WIP

on:
  workflow_dispatch:
  push:
    branches: ["agent/full-lean-formalization"]
    paths:
      - "LeanFormalization/**"
      - "scripts/**"
      - "certificate_data/**"
      - "evidence/public_ci_certificate_artifacts/**"
      - "mixed_gamma_certificates/requirements-hashed.txt"
      - "lakefile.lean"
      - "lean-toolchain"
      - "lake-manifest.json"
      - ".github/workflows/full-formalization-wip.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "LeanFormalization/**"
      - "scripts/**"
      - "certificate_data/**"
      - "evidence/public_ci_certificate_artifacts/**"
      - "mixed_gamma_certificates/requirements-hashed.txt"
      - "lakefile.lean"
      - "lean-toolchain"
      - "lake-manifest.json"
      - ".github/workflows/full-formalization-wip.yml"

permissions:
  contents: read

jobs:
  generated-certificates:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Gate downloaded public artifacts by their original SHA-256 inventories
        shell: bash
        run: |
          set -euo pipefail
          for manifest in evidence/public_ci_certificate_artifacts/*/*-artifact-sha256.txt; do
            case_dir="$(dirname "$manifest")"
            manifest_name="$(basename "$manifest")"
            (cd "$case_dir" && sha256sum --check --strict "$manifest_name")
          done

      - name: Select Python 3.12
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: mixed_gamma_certificates/requirements-hashed.txt

      - name: Install hash-pinned generator dependency
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --require-hashes -r mixed_gamma_certificates/requirements-hashed.txt

      - name: Build pinned base and prepare Lean
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1
        with:
          build: true
          test: false
          lint: false
          use-github-cache: false
          use-mathlib-cache: true
          leanchecker: true
      - name: Re-extract and independently verify all public witnesses
        shell: bash
        run: |
          set -euo pipefail
          python scripts/extract_and_generate_lean.py evidence/public_ci_certificate_artifacts .generated
          diff -ru LeanFormalization/Certificates .generated/LeanFormalization/Certificates
          diff -u LeanFormalization/AllCertificates.lean .generated/LeanFormalization/AllCertificates.lean
          diff -ru certificate_data .generated/certificate_data --exclude=full_cubic_system.json
      - name: Compile all generated certificate replays
        shell: bash
        run: |
          set -euo pipefail
          lake build FullLeanFormalization 2>&1 | tee FullLeanFormalization.log
          if grep -R -F "sorryAx" -- *.log; then
            echo "Unexpected sorryAx dependency" >&2
            exit 1
          fi
      - name: Compile full cubic bridge candidate
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate_full_cubic_scaffold.py
          git diff --exit-code -- LeanFormalization/FullCubicScaffold.lean certificate_data/full_cubic_system.json
          lake build LeanFormalization.FullCubicScaffold 2>&1 | tee FullCubicScaffold.log
          if grep -F "sorryAx" FullCubicScaffold.log; then
            echo "Unexpected sorryAx dependency" >&2
            exit 1
          fi
      - name: Upload compiler logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: full-formalization-wip-logs
          path: "*.log"
          if-no-files-found: warn
